# ROCm (AMD GPU) override — Linux containers (incl. Docker Desktop on Windows
# with a WSL2 ROCm setup). For AMD on Windows WITHOUT container GPU passthrough,
# use the native path instead (scripts/run-native.py + docker-compose.native-ai.yml).
#
# Layer this on top of docker-compose.yml to run the AI compute services on an
# AMD GPU via ROCm. It:
#
#   1. Swaps Ollama (the main local LLM) for the official `ollama/ollama:rocm`
#      image and hands it the AMD GPU.
#   2. Rebuilds every torch-using service (turboquant, image, tts, speaker)
#      against the PyTorch ROCm wheel index and hands each the AMD GPU. The
#      service code already targets the GPU through torch's HIP backend
#      (torch.cuda.is_available() is True on a ROCm build), so no app changes
#      are needed — only the ROCm torch wheels and the device nodes.
#
# AMD exposes the GPU to containers through two device nodes — /dev/kfd (the
# compute driver) and /dev/dri (the render nodes) — plus membership in the
# host's `video` and `render` groups. The VIDEO_GID / RENDER_GID values are
# host-specific; scripts/install.sh detects them and writes them to .env. If
# you run compose by hand, set them yourself:
#   VIDEO_GID=$(getent group video | cut -d: -f3) \
#   RENDER_GID=$(getent group render | cut -d: -f3) \
#   docker compose -f docker-compose.yml -f docker-compose.rocm.yml up -d --build
#
# Some consumer cards (RX 6000/7000, integrated GPUs) need an architecture
# override so ROCm treats them as a supported gfx target — set
# HSA_OVERRIDE_GFX_VERSION in .env (e.g. 10.3.0 for RDNA2, 11.0.0 for RDNA3).
#
# The ROCm torch wheel index defaults to rocm6.2; override with ROCM_TORCH_INDEX
# to match your installed ROCm series (e.g. .../whl/rocm6.3).
#
# NOTE: whisper-service (CTranslate2) and face-service (MediaPipe) do not use
# PyTorch and have no ROCm path, so they stay on CPU here — that's expected.

# AMD GPU device passthrough, shared by every ROCm service.
x-amd-gpu: &amd-gpu
  devices:
    - /dev/kfd
    - /dev/dri
  group_add:
    - "${VIDEO_GID:-44}"
    - "${RENDER_GID:-993}"
  security_opt:
    - seccomp:unconfined

services:
  ollama:
    image: ollama/ollama:rocm
    <<: *amd-gpu
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-}

  turboquant-service:
    build:
      context: ./services/turboquant-service
      dockerfile: Dockerfile.rocm
      args:
        # Pin these to your ROCm series + GPU. scripts/install.sh detects the
        # gfx target from rocminfo and writes BNB_ROCM_ARCH to .env so
        # bitsandbytes is compiled with HIP for your exact card.
        BASE_IMAGE: ${ROCM_BASE_IMAGE:-rocm/dev-ubuntu-22.04:6.2-complete}
        ROCM_INDEX: ${ROCM_TORCH_INDEX:-https://download.pytorch.org/whl/rocm6.2}
        BNB_ROCM_ARCH: ${BNB_ROCM_ARCH:-gfx1030;gfx1100;gfx1101;gfx90a;gfx942}
        BUILD_BNB: ${BUILD_BNB:-1}
    <<: *amd-gpu
    environment:
      - DEVICE=${OPENCUTAI_AI_COMPUTE_MODE:-rocm}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-}
      # torch.compile → Triton-ROCm kernels for faster inference. Set to 0 to
      # disable (e.g. to skip the one-time compile latency on first request).
      - TURBOQUANT_COMPILE=${TURBOQUANT_COMPILE:-1}

  image-service:
    build:
      args:
        TORCH_INDEX_URL: ${ROCM_TORCH_INDEX:-https://download.pytorch.org/whl/rocm6.2}
        TORCH_PACKAGES: torch
    <<: *amd-gpu
    environment:
      - IMAGE_DEVICE=${OPENCUTAI_AI_COMPUTE_MODE:-auto}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-}

  tts-service:
    build:
      args:
        # rocm6.2 ships torch 2.5.1, which satisfies coqui-tts's torch<2.6 cap.
        TORCH_INDEX_URL: ${ROCM_TORCH_INDEX:-https://download.pytorch.org/whl/rocm6.2}
        TORCH_PACKAGES: torch==2.5.1 torchaudio==2.5.1
    <<: *amd-gpu
    environment:
      - TTS_DEVICE=${OPENCUTAI_AI_COMPUTE_MODE:-auto}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-}

  speaker-service:
    build:
      args:
        TORCH_INDEX_URL: ${ROCM_TORCH_INDEX:-https://download.pytorch.org/whl/rocm6.2}
        TORCH_PACKAGES: torch torchaudio
    <<: *amd-gpu
    environment:
      - SPEAKER_DEVICE=${OPENCUTAI_AI_COMPUTE_MODE:-auto}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-}
